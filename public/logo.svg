<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Netra-Anveshan AI Research Institute realistic brain logo">
  <defs>
    <linearGradient id="bg" x1="20" y1="16" x2="236" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F3DAF"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 128) rotate(90) scale(120)">
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.25"/>
    </radialGradient>
    <linearGradient id="brainBase" x1="74" y1="58" x2="186" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE7EF"/>
      <stop offset="0.55" stop-color="#FFC8D8"/>
      <stop offset="1" stop-color="#F29AB3"/>
    </linearGradient>
    <linearGradient id="fold" x1="92" y1="86" x2="166" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C84D75"/>
      <stop offset="1" stop-color="#A23562"/>
    </linearGradient>
    <linearGradient id="stem" x1="116" y1="176" x2="141" y2="205" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4B2C4"/>
      <stop offset="1" stop-color="#D97897"/>
    </linearGradient>
    <filter id="shadow" x="48" y="44" width="160" height="176" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#12072A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#bg)"/>
  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#vignette)"/>

  <g filter="url(#shadow)">
    <!-- Main brain mass -->
    <path d="M121 62C108 55 90 59 80 72C72 82 69 96 72 109C62 118 58 132 62 146C66 160 77 170 90 173C96 184 108 191 121 191C130 191 138 188 145 182C152 188 160 191 169 191C184 191 197 181 202 166C206 152 203 137 194 127C197 116 195 104 189 95C182 84 171 77 158 76C151 67 140 62 128 62C126 62 123 62 121 62Z" fill="url(#brainBase)"/>

    <!-- Brain stem -->
    <path d="M117 184C117 176 123 170 131 170C139 170 145 176 145 184V195C145 202 139 208 131 208C123 208 117 202 117 195V184Z" fill="url(#stem)"/>

    <!-- Midline -->
    <path d="M128 73V185" stroke="#B54872" stroke-width="4.5" stroke-linecap="round" opacity="0.65"/>

    <!-- Left hemisphere folds -->
    <path d="M101 80C92 81 85 88 84 98C83 107 89 114 97 116" stroke="url(#fold)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M95 121C84 122 76 131 77 142C78 152 87 160 97 161" stroke="url(#fold)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M113 97C104 99 99 106 99 114C99 123 105 130 114 132" stroke="url(#fold)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M112 142C103 144 97 152 98 161C99 169 106 175 115 176" stroke="url(#fold)" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Right hemisphere folds -->
    <path d="M155 80C164 81 171 88 172 98C173 107 167 114 159 116" stroke="url(#fold)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M161 121C172 122 180 131 179 142C178 152 169 160 159 161" stroke="url(#fold)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M143 97C152 99 157 106 157 114C157 123 151 130 142 132" stroke="url(#fold)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M144 142C153 144 159 152 158 161C157 169 150 175 141 176" stroke="url(#fold)" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Subtle highlights -->
    <path d="M86 88C93 76 106 70 118 72" stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="4" stroke-linecap="round"/>
    <path d="M139 72C154 72 167 80 174 92" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
